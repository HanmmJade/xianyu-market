# 全局配置
crawler:
  headless: false              # 浏览器是否无头模式
  max_pages_per_keyword: 5     # 每个关键词最多爬几页
  min_delay: 3                 # 最小请求间隔(秒)
  max_delay: 8                 # 最大请求间隔(秒)
  timeout: 30000               # 页面加载超时(ms)

schedule:
  enabled: true
  cron: "daily 2:00"           # 每天凌晨2点执行
  retry_count: 2
  retry_delay: 300

export:
  output_dir: "web/data"       # JSON输出目录

server:
  host: "0.0.0.0"
  port: 8088
